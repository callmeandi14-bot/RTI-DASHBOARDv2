<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RTI DASHBOARD - LOGIN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="bg-[#080f1e] flex items-center justify-center min-h-screen">

    <div class="flex flex-col items-center px-8 py-12 w-full max-w-sm">
        <img src="logo.png" alt="Logo RTI" class="w-20 h-20 object-contain mb-6">
        <h1 class="text-2xl font-black text-white tracking-tighter mb-1">RTI<span class="text-emerald-400">.DASHBOARD</span></h1>
        <p class="text-white/40 text-xs font-semibold tracking-widest uppercase mb-10">Staff Access</p>

        <div class="w-full bg-white/5 border border-white/10 rounded-2xl p-6 flex flex-col items-center gap-4">
            <div class="w-14 h-14 rounded-2xl bg-emerald-500/10 flex items-center justify-center mb-2">
                <svg class="w-7 h-7 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                </svg>
            </div>
            <h2 class="text-white font-black text-lg">Halaman Staff</h2>
            <p class="text-white/40 text-sm text-center">Masuk menggunakan akun Google yang terdaftar sebagai staff RTI.</p>

            <div id="g_id_onload"
                data-client_id="328210653829-l7f5c1emca2hpkngkll0oqjo19hlnjta.apps.googleusercontent.com"
                data-callback="handleCredentialResponse"
                data-auto_prompt="false">
            </div>
            <div class="g_id_signin"
                data-type="standard"
                data-size="large"
                data-theme="outline"
                data-text="sign_in_with"
                data-shape="rectangular"
                data-logo_alignment="left"
                data-width="280">
            </div>

            <p id="status-msg" class="text-red-400 text-xs text-center hidden"></p>
        </div>

        <a href="index.html" class="mt-8 text-white/30 text-xs hover:text-white/60 transition-colors">← Kembali ke Home</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithCredential, signOut } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBFbXa_03QYM8DlBkDw7UMZttBMABdtdf4",
            authDomain: "rti-dashboard-7cd8f.firebaseapp.com",
            projectId: "rti-dashboard-7cd8f",
            storageBucket: "rti-dashboard-7cd8f.firebasestorage.app",
            messagingSenderId: "328210653829",
            appId: "1:328210653829:web:2796c8a0995bfdf232bfec"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.handleCredentialResponse = async (response) => {
    const statusMsg = document.getElementById('status-msg');
    statusMsg.textContent = 'Memverifikasi...';
    statusMsg.classList.remove('hidden');

    try {
        const credential = GoogleAuthProvider.credential(response.credential);
        const result = await signInWithCredential(auth, credential);
        const email = result.user.email;

        const docRef = doc(db, "staff", email);
        const docSnap = await getDoc(docRef);

        if (docSnap.exists()) {
            window.location.replace("staff-only-1.html");
        } else {
            // Jangan signOut dulu, langsung ke denied
            window.location.replace("denied.html");
        }
    } catch (e) {
        statusMsg.textContent = 'Login gagal: ' + e.message;
        statusMsg.classList.remove('hidden');
    }
};
    </script>
</body>
</html>
